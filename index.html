<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>ytmp3 - YouTube 转换器 / YouTube Converter</title>
    <style>
      body { font-family: system-ui, Arial; max-width:720px;margin:40px auto;padding:16px }
      input,select,button { font-size:16px;padding:8px;margin:6px 0 }
    </style>
  </head>
  <body>
    <h1 id="title">ytmp3 — YouTube 转换器 / YouTube Converter</h1>
    <p id="desc">粘贴 YouTube 链接，选择格式，点击 Convert。<br/>Paste your YouTube link, choose format, click Convert.</p>
    <div style="margin-top:8px"><label for="lang">Language:</label>
      <select id="lang"><option value="auto">Auto</option><option value="zh">中文</option><option value="en">English</option></select>
    </div>

    <form id="form">
      <input id="url" placeholder="Paste your YouTube link / 粘贴 YouTube 链接" size="60" required />
      <br />
      <select id="format">
        <option value="mp3">MP3 (audio)</option>
        <option value="mp4">MP4 (video)</option>
      </select>
      <br />
      <button type="submit" id="convertBtn">Convert / 转换</button>
    </form>

    <div id="status"></div>

    <script>
      const form = document.getElementById('form')
      const status = document.getElementById('status')
      const urlInput = document.getElementById('url')
      const formatSelect = document.getElementById('format')
      const submitBtn = form.querySelector('button[type=submit]')
      const titleEl = document.getElementById('title')
      const descEl = document.getElementById('desc')
      const langSelect = document.getElementById('lang')

      let I18N = null
      async function loadI18n() {
        if (I18N) return I18N
        const res = await fetch('/frontend/i18n.json')
        I18N = await res.json()
        return I18N
      }

      function chooseLang() {
        const v = langSelect.value
        if (v === 'auto') {
          const nav = navigator.language || navigator.userLanguage || 'en'
          return nav.startsWith('zh') ? 'zh' : 'en'
        }
        return v
      }

      function t(key) {
        if (!I18N) return key
        const lang = chooseLang()
        return (I18N[lang] && I18N[lang][key]) || (I18N['en'] && I18N['en'][key]) || key
      }

      async function applyLang() {
        await loadI18n()
        titleEl.textContent = t('title')
        descEl.textContent = t('desc')
        urlInput.placeholder = t('urlPlaceholder')
        // update selects
        formatSelect.options[0].text = t('formatMp3')
        formatSelect.options[1].text = t('formatMp4')
        submitBtn.textContent = t('buttonConvert')
      }

      langSelect.addEventListener('change', applyLang)
      applyLang().catch(()=>{})

      // Prefill from query param `source`
      const params = new URLSearchParams(window.location.search)
      const source = params.get('source')
      if (source) urlInput.value = decodeURIComponent(source)

      function setBusy(b) {
        submitBtn.disabled = b
        urlInput.disabled = b
        formatSelect.disabled = b
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault()
        setBusy(true)
        status.textContent = t('creating')
        const url = urlInput.value.trim()
        const format = formatSelect.value

        const data = new FormData()
        data.append('url', url)
        data.append('format', format)

        try {
          const res = await fetch('http://127.0.0.1:8000/convert_async', {
            method: 'POST', body: data
          })
          if (!res.ok) throw new Error('Server returned ' + res.status)
          const j = await res.json()
          const jobId = j.job_id
          status.textContent = t('jobCreated') + '：' + jobId

          // poll
          const pollInterval = 3000
          let stopped = false
          const id = setInterval(async () => {
            try {
              const s = await fetch('http://127.0.0.1:8000/status/' + jobId)
              if (!s.ok) throw new Error('状态请求失败')
              const sj = await s.json()
              status.textContent = t('statusPrefix') + '：' + jobId + ' 状态：' + sj.status
              if (sj.status === 'completed') {
                clearInterval(id)
                stopped = true
                status.textContent = t('completedDownloading')
                const dl = await fetch('http://127.0.0.1:8000/download/' + jobId)
                if (!dl.ok) throw new Error('下载失败: ' + dl.status)
                const blob = await dl.blob()
                const disposition = dl.headers.get('content-disposition')
                let filename = (format === 'mp3' ? 'download.mp3' : 'download.mp4')
                if (disposition) {
                  const match = /filename="?([^";]+)"?/.exec(disposition)
                  if (match) filename = match[1]
                }
                const a = document.createElement('a')
                const urlObj = URL.createObjectURL(blob)
                a.href = urlObj
                a.download = filename
                document.body.appendChild(a)
                a.click()
                a.remove()
                URL.revokeObjectURL(urlObj)
                status.textContent = t('downloadComplete') + '：' + filename
                setBusy(false)
              } else if (sj.status === 'failed') {
                clearInterval(id)
                stopped = true
                status.textContent = t('failed') + '：' + (sj.error || '')
                setBusy(false)
              }
            } catch (err) {
              console.error(err)
              clearInterval(id)
              stopped = true
              status.textContent = t('pollingError') + '：' + (err.message || err)
              setBusy(false)
            }
          }, pollInterval)

          // fallback timeout after 30 minutes
          setTimeout(() => {
            if (!stopped) {
              clearInterval(id)
              status.textContent = t('timeout')
              setBusy(false)
            }
          }, 30 * 60 * 1000)

        } catch (err) {
          console.error(err)
          status.textContent = t('createJobError') + '：' + (err.message || err)
          setBusy(false)
        }
      })
    </script>
  </body>
</html>
