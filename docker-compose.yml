version: '3.8'
services:
  ytmp3:
    build:
      context: .
      dockerfile: ytmp3/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./ytmp3/frontend:/app/frontend:ro
      - ./ytmp3/extension:/app/extension:ro
      - ./data:/app/data
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
